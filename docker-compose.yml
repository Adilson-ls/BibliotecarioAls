version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bibliotecario
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/bibliotecario
      - NODE_ENV=production
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3001"
    environment:
      - API_URL=http://backend:3000
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  postgres_data: